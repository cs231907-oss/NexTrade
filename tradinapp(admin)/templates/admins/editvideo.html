<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video editing section</title>
    <!--favivon-->
    <link href="/static/assets/images/nexicon.png" sizes="32x32" rel="icon">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #007bff, #00c6ff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
    overflow-x: hidden;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            /* Animation properties */
            animation: floatIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
         /* Floating animation */
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .x{
            position: absolute;
            top: 40px;
            left: 40px;
            background: linear-gradient(to right, #00a4ff, #00c6ff);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s ease;
            z-index: 10;
            padding: 8px 16px;
            animation: slideIn 0.8s ease-out 0.2s forwards;
            opacity: 0;
            transform: translateX(-20px);
        }
         /* Back button animation */
        @keyframes slideIn {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .xhover {
            transform: scale(1.05);
        }

        button[type="submit"] {
            background: linear-gradient(to right, #007bff, #00c6ff);
            border: none;
            font-weight: bold;
            width: 100%;
            transition: transform 0.2s ease;
            padding: 10px;
            border-radius: 5px;
            color: white;
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            transform: scale(1.02);
        }

        .form-group {
            margin-bottom: 1.5rem;
            /* Animation for form elements */
            animation: fadeIn 0.8s ease-out 0.4s forwards;
            opacity: 0;
        }
         /* Form elements animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        /* Stagger animations for form elements */
        .form-group:nth-child(1) {
            animation-delay: 0.4s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.6s;
        }


        .video-preview {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .video-preview video {
            max-width: 100%;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .upload-label {
            white-space: nowrap; /* Prevents text from breaking into multiple lines */
            padding-top: 8px; /* Aligns with the file input */
        }
    </style>
</head>
<body>
    <a href="/myapp/view_video/" class="btn btn-primary shadow x">Bcak</a>

    <div class="card bg-light">
        <h2 class="text-center mb-4">Edit video</h2>
        <form action="/myapp/editvideo_post/" method="post">
            {% csrf_token %}
            <input type="hidden" value="{{ data.id }}" name="id">

            <div class="form-group">
                <label for="Title">Title</label>
                <input type="text" class="form-control" value="{{ data.title }}" id="Title" placeholder="Enter Title" required name="vtitle">
            </div>

            <div class="form-group">
                <div class="row">
                    <div class="col-sm-4">
                        <label for="video" class="upload-label">Upload Video</label>
                    </div>
                    <div class="col-sm-8">
                        <input type="file" class="form-control" id="video" accept="video/MPV/*" name="vidget">
                    </div>
                </div>

                <div class="video-preview mt-3">
                    <video src="{{ data.video }}" controls height="150"></video>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block mt-4">Edit</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
