{% extends "admins/home_index.html" %}
{% block body %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Feedback | NexTrade</title>
  <!-- Favicon -->
  <link href="/static/assets/images/nexicon.png" sizes="32x32" rel="icon">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <!-- FontAwesome (for icons) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

  <style>

    .back-btn {
      margin-top: 20px;
      margin-left: -20px;
      background: linear-gradient(to right, #00a4ff, #00c6ff);
      border: none;
      border-radius: 10px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }
    .back-btn:hover {
      transform: scale(1.05);
    }

    /* Card + Table Styling */
    .table-card {
      border-radius: 0.75rem;
      overflow: hidden;
      background: transparent;
    }
    .table-card .card-header {
      background: #0d6efd;
      color: white;
      font-weight: 600;
      background: transparent;
    }
    .table thead th:first-child {
      border-top-left-radius: 0.75rem;
    }
    .table thead th:last-child {
      border-top-right-radius: 0.75rem;
    }
    .table-responsive{
      border-radius: 0.75rem;
      padding: 1rem;
      background: transparent;
    }

    /* Add subtle animation to table rows */
    #feedbackTable tbody tr {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    #feedbackTable tbody tr:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    /* Animate status badges */
    .badge {
      transition: all 0.3s ease;
    }

    .badge:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
<div class="container my-4">
{#  <a href="/myapp/home_index/" class="btn btn-primary shadow back-btn">Back</a>#}

  <!-- Feedback Card -->
  <div class="card shadow-lg table-card mt-5">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0"><i class="fas fa-comment-dots me-2 text-primary"> Feedback</i></h4>
    </div>
    <div class="card-body">
      <!-- Date Filters -->
      <div class="row mb-3">
        <div class="col-md-4">
          <label for="fromDate" class="form-label">From Date</label>
          <input type="date" id="fromDate" class="form-control">
        </div>
        <div class="col-md-4">
          <label for="toDate" class="form-label">To Date</label>
          <input type="date" id="toDate" class="form-control">
        </div>
      </div>

      <!-- Feedback Table -->
      <div class="table-responsive">
        <table id="feedbackTable" class="table table-striped table-hover align-middle mb-0">
          <thead class="table-primary">
            <tr>
              <th>Sl. No.</th>
              <th>Date</th>
              <th>Feedback</th>
              <th>User Info</th>
            </tr>
          </thead>
          <tbody>
          {% for i in data %}
            <tr>
              <td>{{ forloop.counter }}</td>
              <td>{{ i.date }}</td>
              <td>{{ i.feedback }}</td>
              <td>{{ i.CUSTOMER.name }}</td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
  // Extend DataTables with custom date filtering
  $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
    const min = document.getElementById('fromDate').value;
    const max = document.getElementById('toDate').value;
    const dateStr = data[1]; // column index 1 = Date
    const date = new Date(dateStr);

    const minDate = min ? new Date(min) : null;
    const maxDate = max ? new Date(max) : null;

    return (!minDate || date >= minDate) && (!maxDate || date <= maxDate);
  });

  // Initialize DataTable + filters
  $(document).ready(function () {
    const table = $('#feedbackTable').DataTable({ pageLength: 5 });

    $('#fromDate, #toDate').on('change', function () {
      table.draw();
    });
  });
</script>
</body>
</html>
{% endblock %}
