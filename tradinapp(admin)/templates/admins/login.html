{% load static %}
<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexTrade</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link href="/static/assets/images/nexicon.png" sizes="192x192" rel="icon">

    <style>
        body {
            background: linear-gradient(to left, #0553ff, #00c6ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .lg{
            height:180px;
            width:180px;
            margin-top: -17px!important;
            margin-left: 65px !important;
            margin-bottom: 1px !important;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 5px 10px 25px rgba(102, 16, 242, 1)!important;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-card h3 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #007bff;
        }

        .form-control {
            border-radius: 10px;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .toggle-password {
            position: absolute;
            right: 10px;
            top: 75%;
            transform: translateY(-100%);
            cursor: pointer;
            color: #666;
            display: none;
        }

        .btn-login {
            background: linear-gradient(to right, #6200ff, #00c6ff);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        .btn-login:hover {
            transform: scale(1.03);
        }

        .extra-links {
            text-align: center;
            margin-top: 15px;
        }

        .extra-links a {
            color: #007bff;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
        /* Message Popup Styles */
    .messages-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1100;
      max-width: 400px;
    }

    .message {
      padding: 15px 20px;
      margin-bottom: 15px;
      border-radius: 12px;
      color: white;
      display: flex;
      align-items: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      transform: translateX(100%);
      opacity: 0;
      transition: all 0.5s ease;
    }

    .message.show {
      transform: translateX(0);
      opacity: 1;
    }

    .message i {
      margin-right: 12px;
      font-size: 1.2rem;
    }

    .message.success {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-left: 5px solid #1e8449;
    }

    .message.info {
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-left: 5px solid #1c5f8e;
    }


    .message.error {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border-left: 5px solid #842618;
    }

    .message-content {
      flex-grow: 1;
    }

    .message-close {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
      margin-left: 10px;
    }
    </style>
</head>
<body>
    <div class="login-card shadow-lg">
        <img src="/static/assets/images/nexlogo1.png" class="lg">
        <h3>Welcome Back</h3>
        <form method="post" action="/myapp/login_post/">
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="sr-only">Username</label>
                <input type="text" class="form-control" id="username" name="uname" placeholder="Username" required>
            </div>
            <div class="mb-3 password-wrapper">
                <label for="password" class="sr-only">Password</label>
                <input type="password" class="form-control" id="password" name="pswd" placeholder="Password" required>
                <i class="far fa-eye-slash toggle-password" onclick="togglePassword('password', this)"></i>
            </div>
            <button type="submit" class="btn btn-login w-100 shadow text-light" id="loginBtn" disabled>Login</button>
        </form>
        <div class="extra-links">
            <a href="/myapp/forgot_password_get/">Forgot Password?</a>
{#            <div class="text-center mt-3">#}
{#          {% for i in messages %}#}
{#            <div class="text-danger">{{ i }}</div>#}
{#          {% endfor %}#}
{#        </div>#}
        </div>
    </div>

    <!-- Messages Container -->
<div class="messages-container" id="messagesContainer">
  <!-- Messages will be added here dynamically -->
  {% for message in messages %}
  <div class="message {{ message.tags }}">
    <i class="fas
      {% if message.tags == 'success' %}fa-check-circle
      {% elif message.tags == 'info' %}fa-info-circle
      {% elif message.tags == 'warning' %}fa-exclamation-triangle
      {% else %}fa-exclamation-circle
      {% endif %}">
    </i>
    <div class="message-content">{{ message }}</div>
    <button class="message-close" onclick="this.parentElement.remove()">
      <i class="fas fa-times"></i>
    </button>
  </div>
  {% endfor %}
</div>

    <script>
        // Toggle password visibility
        function togglePassword(fieldId, icon) {
            const input = document.getElementById(fieldId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        const username = document.getElementById("username");
        const password = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const toggleIcon = password.nextElementSibling;

        // Show/hide eye icon dynamically
        password.addEventListener("input", () => {
            toggleIcon.style.display = password.value.length > 0 ? "block" : "none";
            checkInputs();
        });

        username.addEventListener("input", checkInputs);

        // Enable login button only when both fields have value
        function checkInputs() {
            if (username.value.length > 0 && password.value.length > 0) {
                loginBtn.disabled = false;
            } else {
                loginBtn.disabled = true;
            }
        }

        // Show messages with animation
    function showMessages() {
      const messages = document.querySelectorAll('.message');
      messages.forEach((message, index) => {
        setTimeout(() => {
          message.classList.add('show');
        }, 100 * index);
      });

      // Auto-remove messages after 5 seconds
      setTimeout(() => {
        messages.forEach(message => {
          if (message.parentElement) {
            message.classList.remove('show');
            setTimeout(() => {
              if (message.parentElement) {
                message.remove();
              }
            }, 500);
          }
        });
      }, 5000);
    }

    // Initialize messages on page load
    showMessages();

    // Close message when close button is clicked
    document.querySelectorAll('.message-close').forEach(button => {
      button.addEventListener('click', function() {
        const message = this.parentElement;
        message.classList.remove('show');
        setTimeout(() => {
          if (message.parentElement) {
            message.remove();
          }
        }, 500);
      });
    });
    </script>
</body>
</html>
