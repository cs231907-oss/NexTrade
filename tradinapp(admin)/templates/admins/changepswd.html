<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome 5 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

  <!-- Favicon -->
  <link href="/static/assets/images/nexicon.png" sizes="32x32" rel="icon">

  <style>
    body {
      background: linear-gradient(to right, #007bff, #00c6ff);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 600;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      padding: 25px 30px;
      max-width: 450px;
      width: 100%;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #666;
      display: none; /* hidden by default */
    }

    .match-message {
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .big-container{
      margin-left: 455px;
    }
      .x {
      margin-top: -600px;
      margin-left: 40px;
      background: linear-gradient(to right, #00a4ff, #00c6ff);
      border: none;
      border-radius: 10px;
      font-weight: bold;
      transition: transform 0.2s ease;
    }
    .x:hover { transform: scale(1.05); }

                /* Message Popup Styles */
    .messages-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1100;
      max-width: 400px;
    }

    .message {
      padding: 15px 20px;
      margin-bottom: 15px;
      border-radius: 12px;
      color: white;
      display: flex;
      align-items: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      transform: translateX(100%);
      opacity: 0;
      transition: all 0.5s ease;
    }

    .message.show {
      transform: translateX(0);
      opacity: 1;
    }

    .message i {
      margin-right: 12px;
      font-size: 1.2rem;
    }

    .message.success {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-left: 5px solid #1e8449;
    }

    .message.info {
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-left: 5px solid #1c5f8e;
    }

    .message.warning {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      border-left: 5px solid #b45a06;
    }

    .message.error {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      border-left: 5px solid #842618;
    }

    .message-content {
      flex-grow: 1;
    }

    .message-close {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
      margin-left: 10px;
    }
  </style>
</head>
<body>
 <a href="/myapp/home_index/" class="btn btn-primary shadow x">Back</a>
  <div class="container big-container">
    <div class="card bg-light">
      <h2 class="text-center mb-4">Change Password</h2>
      <form action="/myapp/changepswd_post/" method="post">
        {% csrf_token %}

        <!-- Current Password -->
        <div class="mb-3">
          <label for="currentPassword" class="form-label">Current Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="currentPassword" name="cpswd" minlength="6" required>
            <i class="far fa-eye-slash toggle-password" onclick="togglePassword('currentPassword', this)"></i>
          </div>
        </div>

        <!-- New Password -->
        <div class="mb-3">
          <label for="newPassword" class="form-label">New Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="newPassword" name="npswd" minlength="6" required disabled>
            <i class="far fa-eye-slash toggle-password" onclick="togglePassword('newPassword', this)"></i>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="confirmPassword" name="confirmpswd" required disabled>
          </div>
          <div id="matchMessage" class="match-message"></div>
        </div>

        <!-- Submit Button -->
        <div class="text-center">
           <button type="submit" class="btn btn-primary w-100" id="submitBtn" disabled>Change Password</button>
        </div>

        <!-- Django messages
        <div class="text-center mt-3">
          {% for i in messages %}
            <div class="text-danger">{{ i }}</div>
          {% endfor %}
        </div>
        -->
      </form>
    </div>
  </div>
 <!-- Messages Container -->
<div class="messages-container" id="messagesContainer">
  <!-- Messages will be added here dynamically -->
  {% for message in messages %}
  <div class="message {{ message.tags }}">
    <i class="fas
      {% if message.tags == 'success' %}fa-check-circle
      {% elif message.tags == 'info' %}fa-info-circle
      {% elif message.tags == 'warning' %}fa-exclamation-triangle
      {% else %}fa-exclamation-circle
      {% endif %}">
    </i>
    <div class="message-content">{{ message }}</div>
    <button class="message-close" onclick="this.parentElement.remove()">
      <i class="fas fa-times"></i>
    </button>
  </div>
  {% endfor %}
</div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Toggle password visibility
    function togglePassword(fieldId, icon) {
      const input = document.getElementById(fieldId);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      } else {
        input.type = "password";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      }
    }

    // Show/hide eye icon dynamically
    document.querySelectorAll(".password-wrapper input").forEach(input => {
      const icon = input.nextElementSibling;
      input.addEventListener("input", () => { icon.style.display = input.value.length > 0 ? "block" : "none"; });
      input.addEventListener("blur", () => { if (input.value.length === 0) icon.style.display = "none"; });
    });

    const currentPassword = document.getElementById("currentPassword");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const matchMessage = document.getElementById("matchMessage");
    const submitBtn = document.getElementById("submitBtn");
    // Enable new password only after current password is filled
    currentPassword.addEventListener("input", () => {
      if (currentPassword.value.length > 0) {
        newPassword.disabled = false;
      } else {
        newPassword.value = "";
        confirmPassword.value = "";
        matchMessage.textContent = "";
        newPassword.disabled = true;
        confirmPassword.disabled = true;
      }
    });

    // Enable confirm password only after new password has at least 1 character
    newPassword.addEventListener("input", () => {
      if (newPassword.value.length > 0) {
        confirmPassword.disabled = false;
      } else {
        confirmPassword.value = "";
        matchMessage.textContent = "";
        confirmPassword.disabled = true;
      }
    });

    function checkPasswords() {
      const oldVal = currentPassword.value;
      const newVal = newPassword.value;
      const confirmVal = confirmPassword.value;

      submitBtn.disabled = true;
      // New password cannot match current password
      if (newVal && newVal === oldVal) {
        matchMessage.textContent = "New password cannot be the same as current password";
        matchMessage.style.color = "red";
        return;
      }

      if (confirmVal.length === 0) {
        matchMessage.textContent = "";
        return;
      }

      // Character-by-character match
      if (!newVal.startsWith(confirmVal)) {
        matchMessage.textContent = "Passwords do not match";
        matchMessage.style.color = "red";
      } else if (newVal === confirmVal) {
        matchMessage.textContent = "Passwords fully match";
        matchMessage.style.color = "green";
        submitBtn.disabled = false;
      } else {
        matchMessage.textContent = "";
      }
    }

    currentPassword.addEventListener("input", checkPasswords);
    newPassword.addEventListener("input", checkPasswords);
    confirmPassword.addEventListener("input", checkPasswords);

    // Show messages with animation
    function showMessages() {
      const messages = document.querySelectorAll('.message');
      messages.forEach((message, index) => {
        setTimeout(() => {
          message.classList.add('show');
        }, 100 * index);
      });

      // Auto-remove messages after 5 seconds
      setTimeout(() => {
        messages.forEach(message => {
          if (message.parentElement) {
            message.classList.remove('show');
            setTimeout(() => {
              if (message.parentElement) {
                message.remove();
              }
            }, 500);
          }
        });
      }, 5000);
    }

    // Initialize messages on page load
    showMessages();

    // Close message when close button is clicked
    document.querySelectorAll('.message-close').forEach(button => {
      button.addEventListener('click', function() {
        const message = this.parentElement;
        message.classList.remove('show');
        setTimeout(() => {
          if (message.parentElement) {
            message.remove();
          }
        }, 500);
      });
    });
  </script>
</body>
</html>
